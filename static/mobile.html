<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ADB Agent - 手机端</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    height: 100vh; display: flex; flex-direction: column;
    padding: 16px; padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  .header { text-align: center; padding: 16px 0; }
  .header h2 { color: #4fc3f7; font-size: 20px; }
  .header p { color: #666; font-size: 13px; margin-top: 4px; }
  #log {
    flex: 1; overflow-y: auto; padding: 12px;
    background: #1a1a2e; border-radius: 12px;
    font-size: 14px; line-height: 1.6;
    margin-bottom: 12px;
  }
  .log-item { padding: 6px 0; border-bottom: 1px solid #222; }
  .log-instruction { color: #4fc3f7; font-weight: bold; }
  .log-exec { color: #888; font-size: 13px; }
  .log-result { color: #66bb6a; font-weight: bold; }
  .input-area { display: flex; gap: 8px; }
  #input {
    flex: 1; padding: 14px; border-radius: 12px;
    border: 1px solid #333; background: #1a1a2e; color: #fff;
    font-size: 16px; outline: none;
  }
  #input:focus { border-color: #4fc3f7; }
  #sendBtn {
    padding: 14px 24px; border-radius: 12px;
    background: #4fc3f7; color: #000; border: none;
    font-size: 16px; font-weight: bold; cursor: pointer;
  }
  #sendBtn:disabled { opacity: 0.5; }
  #status { text-align: center; padding: 6px; font-size: 12px; color: #666; }
</style>
</head>
<body>
  <div class="header">
    <h2>📱 ADB Agent</h2>
    <p>输入自然语言指令控制手机</p>
  </div>
  <div id="status">连接中...</div>
  <div id="log"></div>
  <div class="input-area">
    <input id="input" placeholder="如：打开微信" autocomplete="off" />
    <button id="sendBtn" onclick="send()">发送</button>
  </div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('input');
const btn = document.getElementById('sendBtn');
const status = document.getElementById('status');
let ws;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/mobile`);
  ws.onopen = () => { status.textContent = '✅ 已连接'; };
  ws.onclose = () => {
    status.textContent = '❌ 断开，重连中...';
    setTimeout(connect, 3000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    addLog(msg.type, msg.data);
    if (msg.type === 'result') {
      btn.disabled = false;
      input.focus();
    }
  };
}

function addLog(type, text) {
  const div = document.createElement('div');
  div.className = 'log-item';
  const cls = { instruction: 'log-instruction', log: 'log-exec', result: 'log-result', status: 'log-exec' };
  div.innerHTML = `<span class="${cls[type] || ''}">${text}</span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function send() {
  const text = input.value.trim();
  if (!text || !ws) return;
  addLog('instruction', '> ' + text);
  ws.send(JSON.stringify({ instruction: text }));
  input.value = '';
  btn.disabled = true;
}

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
connect();
</script>
</body>
</html>
